server:
  port: 8083
  tomcat:
    threads:
      max: 1000
      min-spare: 50
    accept-count: 500
    max-connections: 10000

spring:
  application:
    name: feed-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:3306/biteblog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 200
      minimum-idle: 20
      connection-timeout: 5000
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        deserialization:
          trust:
            all: true
  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1
