server:
  port: 8086

spring:
  application:
    name: rank-service

  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: localhost:8848
    service-registry:
      auto-registration:
        enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/biteblog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1