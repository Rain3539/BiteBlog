server:
  port: 8087

spring:
  application:
    name: notify-service
  # 注意：spring.amqp.deserialization.trust.all 在 yml 中无效（Spring AMQP 走 System.getProperty，不走 Spring 属性绑定）
  # 真正的 trust-all 已在 NotifyApplication.main() 中通过 System.setProperty 设置。
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:3306/biteblog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # 本地未起 RabbitMQ 时可设为 false，避免启动失败（与 Rank 文档思路一致）
        auto-startup: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1
