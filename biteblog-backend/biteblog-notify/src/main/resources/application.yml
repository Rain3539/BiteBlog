server:
  port: 8087

spring:
  application:
    name: notify-service
  # 注意：spring.amqp.deserialization.trust.all 在 yml 中无效（Spring AMQP 走 System.getProperty，不走 Spring 属性绑定）
  # 真正的 trust-all 已在 NotifyApplication.main() 中通过 System.setProperty 设置。
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123456
  datasource:
    url: jdbc:mysql://localhost:3306/biteblog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: true
        # 手动 ack：业务成功才 ack，异常时 nack 转投 DLQ，避免无限重投或静默丢失
        acknowledge-mode: manual

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # notification 表无 status 字段，不在此处配置全局逻辑删除，避免 MP 自动拼 WHERE status=1 出错
      id-type: auto
